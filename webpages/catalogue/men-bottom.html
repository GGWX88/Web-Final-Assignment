<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Men Bottom — Fuku</title>
	<link rel="stylesheet" href="../../stylesheet/style.css">
	<link rel="icon" type="image/svg+xml" href="../../img/favicon.svg">
	<style>
	/*-----page menu-----*/
		.page-menu {
			padding: 1.5% 0 0% 0;
			height: 25vh;
			a {
				text-decoration: none;
				color: gray;
			}
			border-bottom: 1px solid #c0c0c0;
			background-color: #f7f7f7;
		}
		.website-path {
			display: inline-block;
			padding: 0 0 0 2%;
			font-size: 14px;
		}
		.page-name {
			text-align: center;
			font-family: 'Manrope';
			font-size: 50px;
		}

	/*-----cards-----*/
		.catalogue {
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
		}
		.card {
			width: 23vw;
			padding-top: 2vh;
			padding-bottom: 2vh;
			float: left;
			display: flex;
			flex-direction: column;
		}
		.card-img {
			width: 90%;
			object-fit: cover;
			display: block;
			margin: 0 auto;
		}
		.card-info {
			padding-top: 1%;
			padding-left: 7%;
		}
		.card-title {
			font-weight: normal;
			font-size: 20px;
			font-family: 'Hanken Grotesk';
		}
		.card-price {
			display: block;
			font-size: 13px;
			color: grey;
		}
	</style>
</head>
<body>
	<!------[Navigation Bar (Top)]------>
	<header>
		<div class="logo">Fuku</div>
		<nav class="main-nav">
			<a href="../index.html">Home</a>
			<a href="../catalogue.html" class="active">Catalogue</a>
			<a href="../about.html">About</a>
			<a href="../review.html">Review</a>
			<a href="../login.html">Member</a>
		</nav>
	</header>

	<!------[Page Menu]------>
	<section class="page-menu">
		<template id="page-menu-template">
			<span class="website-path">		<!--change span to nav-->
				<a href="../index.html">Home</a> /
				<span class="current-page"></span>
			</span>		<!--change span to nav-->
			<p class="page-name"></p>
		</template>
	</section>


	<!------[Catalogue]------>
	<section class="catalogue">
		<template id="card-template">
			<article class="card">
				<img class="card-img">
				<div class="card-info">
					<h5 class="card-title"></h5>
					<span class="card-price"></span>
				</div>
			</article>
		</template>
	</section>

	<!------[Card Pop-up]------>
	<template class="">
		<div>
			<img class="">	<!--float left-->
			<h5 class="pop-up-title"></h5>
			<span class="pop-up-price"></span>
			<button>S</button><button>M</button><button>L</button><button>XL</button>
			<button>ADD TO CART</button>
			<p class="product-description"></p>
			<span class="material"></span>
			<span></span>
		</div>
	</template>

	<!------[Navigation Bar (Bottom)]------>
	<footer>
	<div class="footer-top">
		<div class="footer-column">
			<h4>Shop</h4>
			<a href="women.html">Women</a>
			<a href="men.html">Men</a>
		</div>
		<div class="footer-column">
			<h4>About</h4>
			<a href="../about.html">About Us</a>
		</div>
		<div class="footer-column">
			<h4>Support</h4>
			<a href="#">FAQs</a>
			<a href="#">Contact Us</a>
		</div>
		<div class="footer-column">
			<h4>Got a question?</h4>
			<p>+6016-417-5751</p>
			<p>fuku@gmail.com</p>
		</div>
		<div class="footer-column">
			<h4>Get updates when you sign up.</h4>
			<p>Receive the latest updates and more.</p>
			<div class="newsletter">
				<input type="email" placeholder="Enter your email">
				<button>Submit</button>
			</div>
		</div>
	</div>
	<div class="footer-bottom">
		<p>&copy; 2026 Fuku. All rights reserved.</p>
	</div>
</footer>
</body>
</html>


<script>
	/*----------[Catalogue HTMLs]---------*/
	//general shared variables
	let template;
	let clone;
	let imgFilePath;

	// product categories
	let menBottom;

	//-----page menu-----
	template = document.getElementById("page-menu-template");
	clone = template.content.cloneNode(true);
	clone.querySelector(".current-page").innerText = "Men Bottom";
	clone.querySelector(".page-name").innerText = "Men Bottom";
	document.querySelector(".page-menu").appendChild(clone);

	//------cards------
	// product list
	// format: ["image link", "product name", "price",	 "description", ]
	imgFilePath = "./product-img/";
	menBottom = [
		[`${imgFilePath}bot-1.webp`, "Black Short", "RM 59.99"],
		[`${imgFilePath}bot-2.webp`, "Black Short", "RM 59.99"],
		[`${imgFilePath}bot-3.webp`, "Black Short", "RM 59.99"],
		[`${imgFilePath}bot-4.webp`, "Black Short", "RM 59.99"],
		[`${imgFilePath}bot-5.webp`, "Black Short", "RM 59.99"],
		[`${imgFilePath}bot-6.webp`, "Black Short", "RM 59.99"],
		[`${imgFilePath}bot-7.webp`, "Black Short", "RM 59.99"]
	];

	template = document.getElementById("card-template");

	// print cards
	for (let i = 0; i < menBottom.length; i++)
	{
		clone = template.content.cloneNode(true);
		clone.querySelector(".card-img").setAttribute("src", menBottom[i][0]);
		clone.querySelector(".card-img").setAttribute("alt", menBottom[i][1]);
		clone.querySelector(".card-img").setAttribute("title", menBottom[i][1]);
		clone.querySelector(".card-img").addEventListener("click", cardPopUp)
		clone.querySelector(".card-title").innerHTML = menBottom[i][1];
		clone.querySelector(".card-price").innerHTML = menBottom[i][2];
		document.querySelector(".catalogue").appendChild(clone);
	}

	// card pop-up (when image is clicked)
	function cardPopUp()
	{
		
	}

</script>
