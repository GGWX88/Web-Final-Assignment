<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register — Fuku</title>
        <link rel = "stylesheet" href = "../stylesheet/style.css">
        <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    </head>

    <body>
     
        <header>

            <a href="index.html" class="logo">Fuku</a>

            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="catalogue.html">Catalogue</a>
                <a href="about.html">About</a>
                <a href="review.html">Review</a>
                <a href="login.html">Member</a>
            </nav>

        </header>

        <section class = "form-section">

            <h2>Create an Account</h2>
            <p>Join Fuku today and enjoy exclusive fashion collections.</p>

            <form>

                <label for="fullname">Full Name</label>
                <input
                    type="text"
                    id="fullname"
                    placeholder="Enter your full name"
                    required>

                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

                <label for="phone">Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    placeholder="+60..."
                    required>

                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                    required>

                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm password"
                    required>

                <button type="submit">Register</button>

                <p class="form-link">
                    Already have an account?
                    <a href = "login.html">Login Here</a>
                </p>

                <div class="checkbox-group">
                    <input
                        type="checkbox"
                        id="checkbox"
                        required>
                    
                    <label for="checkbox">
                        I have read and agree to the 
                        <strong>Terms &amp; Conditions</strong> and 
                        <strong>Privacy Policy</strong>.
                    </label>
                </div>
<!--Copyright Footer-->
    <div class="form-footer">
        <small>
            <i>&copy; 2026 Fuku. All Rights Reserved.</i>
        </small>
    </div>
</form>
</section>
</body>
</html>
